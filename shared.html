<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>Shared Page</title>
    
    <!-- Base CSS (paths work when shared.html is at project root). Template-specific CSS is injected from templateHeadHtml. -->
    <link rel="stylesheet" href="dist/output.css">
    <link rel="stylesheet" href="public/css/sections.css">
    <link rel="stylesheet" href="public/css/viewport-animations.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
            font-size: 18px;
            color: #666;
        }
        
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: white;
            padding: 2rem;
            text-align: center;
        }
        
        .error-container h1 {
            color: #dc2626;
            margin-bottom: 1rem;
        }
        
        .error-container p {
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        /* Same container as preview.php so injected template CSS (#preview-content.has-full-template) applies */
        #preview-content {
            display: none;
            width: 100%;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background: white;
        }
        #preview-content.loaded {
            display: block;
        }
        /* Match preview: full-height only for non-footer sections so footer stays compact */
        .section {
            position: relative;
        }
        .section:not(footer) {
            min-height: 100vh;
        }
        footer.section {
            min-height: auto;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-container">
        Loading shared page...
    </div>
    
    <div id="error" class="error-container" style="display: none;">
        <h1>Unable to load page</h1>
        <p id="error-message">The shared page could not be loaded.</p>
        <p style="font-size: 14px; color: #999;">Please check the link and try again.</p>
    </div>
    
    <div id="preview-content" class="has-full-template @container"></div>
    
    <script>
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }
        
        // Get share token, slug (publish subdomain), or legacy document ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const shareToken = urlParams.get('token');
        const docId = urlParams.get('doc');

        // Slug can come from ?slug= param (internal rewrite), from the subdomain (slug.yeslovey.com),
        // or from the full hostname when it's a custom domain (e.g. mi-boda.com).
        let shareSlug = urlParams.get('slug');
        if (!shareSlug) {
            const hostParts = window.location.hostname.split('.');
            if (hostParts.length >= 3) {
                const sub = hostParts[0];
                if (sub !== 'www' && sub !== 'www1') {
                    shareSlug = sub;
                }
            } else if (hostParts.length === 2) {
                // Custom domain (e.g. mi-boda.com): use full hostname as slug (stored as share_slug in DB)
                shareSlug = window.location.hostname;
            }
        }

        // Build the appropriate API URL (slug for publish URLs, token for share, doc for legacy)
        let apiUrl = null;
        if (shareSlug) {
            apiUrl = 'api/get.php?slug=' + encodeURIComponent(shareSlug);
        } else if (shareToken) {
            apiUrl = 'api/get.php?token=' + encodeURIComponent(shareToken);
        } else if (docId) {
            apiUrl = 'api/get.php?id=' + encodeURIComponent(docId);
        }

        if (!apiUrl) {
            showError('Missing document ID or link');
        } else {
            // Resolve API and asset URLs relative to current page (shared.html may be at root or in a subpath)
            const basePath = window.location.pathname.replace(/\/[^/]*$/, '/');
            const resolveApi = (url) => url.startsWith('http') ? url : (window.location.origin + basePath + url.replace(/^\.\//, ''));

            fetch(resolveApi(apiUrl))
                .then(response => response.json())
                .then(result => {
                    if (result.error) {
                        throw new Error(result.error);
                    }

                    const pageId = result.id;
                    const formOpen = result.form_open !== false;
                    const formClosedMessage = result.form_closed_message || 'This form is no longer accepting responses.';
                    const data = result.data;
                    const theme = data.theme || 'theme-light-minimal';
                    const fullHtml = (data.fullHtml && typeof data.fullHtml === 'string') ? data.fullHtml.trim() : '';
                    const templateHeadHtml = (data.templateHeadHtml && typeof data.templateHeadHtml === 'string') ? data.templateHeadHtml.trim() : '';
                    const sections = data.sections || [];
                    const animationsEnabled = data.animationsEnabled === true || data.animationsEnabled === 'true';

                    document.getElementById('loading').style.display = 'none';

                    const body = document.body;
                    // Shared view does not use fullPage/scroll logic that adds .fp-completely to sections.
                    // If we add animations-enabled, sections.css hides section content (opacity: 0) until .fp-completely
                    // is set, which never happens here, so hero-names and other content stay invisible.
                    // Omit animations-enabled on shared page so all content is visible (editor is full-HTML, not section-based).
                    body.className = theme;

                    const container = document.getElementById('preview-content');
                    container.classList.add(theme);

                    function resolveUrl(href) {
                        if (!href || href.startsWith('http:') || href.startsWith('https:') || href.startsWith('//') || href.startsWith('data:')) return href;
                        var base = window.location.origin + basePath.replace(/\/$/, '') + '/';
                        var path = href.replace(/^\.\//, '');
                        return base + path;
                    }

                    function injectTemplateHeadHtml(headHtml) {
                        if (!headHtml || headHtml.length === 0) return;
                        var temp = document.createElement('div');
                        temp.innerHTML = headHtml;
                        Array.from(temp.children).forEach(function (node) {
                            var tag = (node.tagName || '').toLowerCase();
                            if (tag === 'style') {
                                var style = document.createElement('style');
                                Array.from(node.attributes).forEach(function (attr) { style.setAttribute(attr.name, attr.value); });
                                style.textContent = node.textContent;
                                document.head.appendChild(style);
                            } else if (tag === 'link') {
                                var link = document.createElement('link');
                                Array.from(node.attributes).forEach(function (attr) {
                                    var val = attr.value;
                                    if (attr.name === 'href' && val) val = resolveUrl(val);
                                    link.setAttribute(attr.name, val);
                                });
                                document.head.appendChild(link);
                            }
                        });
                    }

                    function reactivateBodyScripts(containerEl) {
                        if (!containerEl) return;
                        containerEl.querySelectorAll('script').forEach(function (oldScript) {
                            var newScript = document.createElement('script');
                            Array.from(oldScript.attributes).forEach(function (attr) { newScript.setAttribute(attr.name, attr.value); });
                            newScript.textContent = oldScript.textContent;
                            oldScript.parentNode.replaceChild(newScript, oldScript);
                        });
                    }

                    function cleanEditorMarkup(html) {
                        if (!html) return '';
                        return html
                            .replace(/<div[^>]*class="[^"]*section-menu[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '')
                            .replace(/<button[^>]*class="[^"]*countdown-edit-btn[^"]*"[^>]*>[\s\S]*?<\/button>/gi, '')
                            .replace(/\s+id="mce_\d+"/g, '')
                            .replace(/\s+contenteditable="[^"]*"/g, '')
                            .replace(/\s+spellcheck="[^"]*"/g, '')
                            .replace(/\s+data-mce-style="[^"]*"/g, '')
                            .replace(/\s+data-accordion-initialized="[^"]*"/g, '')
                            .replace(/\s+data-process-accordion-initialized="[^"]*"/g, '')
                            .replace(/\s+data-cloudinary-initialized="[^"]*"/g, '')
                            .replace(/\s+data-countdown-editor-initialized="[^"]*"/g, '')
                            .replace(/\bmce-content-body\b/g, '')
                            .replace(/\bin-viewport\b/g, '')
                            .replace(/\bcountdown-edit-container\b/g, '');
                    }

                    // Remove editor-injected hidden inputs from a form (TinyMCE, MCE, etc.)
                    function removeEditorHiddenInputs(form) {
                        // TinyMCE hides original textareas and adds its own hidden inputs/textareas
                        // with names/IDs starting with "tinymce" or "mce_".
                        // It also adds inputs with no visible purpose that have auto-generated names.
                        var junkSelectors = [
                            'input[type="hidden"][name*="tinymce"]',
                            'input[type="hidden"][name*="mce_"]',
                            'textarea[name*="tinymce"]',
                            'textarea[id*="tinymce"]',
                            'input[id*="mce_"]',
                            'input[id*="tinymce"]'
                        ];
                        junkSelectors.forEach(function (sel) {
                            form.querySelectorAll(sel).forEach(function (el) { el.remove(); });
                        });
                        // Also remove any hidden textarea that TinyMCE leaves behind
                        // (it hides the original with display:none and a generated id)
                        form.querySelectorAll('textarea[style*="display: none"], textarea[style*="display:none"]').forEach(function (el) {
                            if (/tinymce|mce_/i.test(el.id || '')) el.remove();
                        });
                    }

                    // RSVP form interception: intercept all forms in the published page
                    function interceptRsvpForms(containerEl) {
                        if (!containerEl || !pageId) return;
                        var forms = containerEl.querySelectorAll('form');
                        if (!forms.length) return;

                        forms.forEach(function (form) {
                            // Strip TinyMCE editor artifacts from the form DOM before doing anything
                            removeEditorHiddenInputs(form);

                            if (!formOpen) {
                                // Disable form and show closed message at the beginning of the RSVP (before fields)
                                Array.from(form.elements).forEach(function (el) { el.disabled = true; });
                                var msg = document.createElement('div');
                                msg.className = 'rsvp-form-closed-message';
                                msg.style.cssText = 'margin-bottom:20px;padding:14px 18px;background:rgba(0,0,0,0.06);border-radius:8px;text-align:center;font-size:15px;line-height:1.5;opacity:0.9;';
                                msg.textContent = formClosedMessage;
                                form.insertBefore(msg, form.firstChild);
                                return;
                            }

                            // Remove the original inline onsubmit handler
                            form.removeAttribute('onsubmit');

                            form.addEventListener('submit', function (e) {
                                e.preventDefault();
                                e.stopImmediatePropagation();

                                var submitBtn = form.querySelector('[type="submit"], button');
                                var originalText = submitBtn ? submitBtn.textContent : '';
                                if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Sending...'; }

                                var rawData = new FormData(form);
                                var formDataObj = {};
                                // Belt-and-suspenders: also filter by name pattern in case any
                                // TinyMCE field slipped past the DOM cleanup above.
                                rawData.forEach(function (val, key) {
                                    if (!key) return;
                                    if (/tinymce/i.test(key)) return;
                                    if (/^mce/i.test(key)) return;
                                    formDataObj[key] = val;
                                });

                                fetch(resolveApi('api/form-submit.php'), {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ page_id: pageId, form_data: formDataObj })
                                })
                                .then(function (res) { return res.json(); })
                                .then(function (res) {
                                    if (res.success) {
                                        showRsvpToast(form, 'Thank you! Your RSVP has been received.', 'success');
                                        form.reset();
                                    } else if (res.error === 'form_closed') {
                                        showRsvpToast(form, res.message || formClosedMessage, 'info');
                                        Array.from(form.elements).forEach(function (el) { el.disabled = true; });
                                    } else {
                                        showRsvpToast(form, res.error || 'Something went wrong. Please try again.', 'error');
                                    }
                                })
                                .catch(function () {
                                    showRsvpToast(form, 'Connection error. Please try again.', 'error');
                                })
                                .finally(function () {
                                    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = originalText; }
                                });
                            }, true);
                        });
                    }

                    function showRsvpToast(form, message, type) {
                        // Try to use the template's own toast element if present
                        var existingToast = document.getElementById('toast') || document.querySelector('.toast');
                        if (existingToast) {
                            existingToast.textContent = message;
                            existingToast.classList.add('show');
                            setTimeout(function () { existingToast.classList.remove('show'); }, 4000);
                            return;
                        }
                        // Fallback: inject a toast
                        var toast = document.createElement('div');
                        toast.textContent = message;
                        toast.style.cssText = [
                            'position:fixed;bottom:32px;left:50%;transform:translateX(-50%)',
                            'background:' + (type === 'error' ? '#e53e3e' : type === 'info' ? '#718096' : '#38a169'),
                            'color:#fff;padding:12px 24px;border-radius:8px',
                            'font-size:15px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.15)',
                            'transition:opacity 0.3s'
                        ].join(';');
                        document.body.appendChild(toast);
                        setTimeout(function () {
                            toast.style.opacity = '0';
                            setTimeout(function () { toast.remove(); }, 400);
                        }, 4000);
                    }

                    if (fullHtml.length > 0) {
                        if (templateHeadHtml.length > 0) injectTemplateHeadHtml(templateHeadHtml);

                        var cleaned = cleanEditorMarkup(fullHtml);
                        container.innerHTML = cleaned;
                        reactivateBodyScripts(container);
                        container.classList.add('loaded');
                        if (window.initSharedNavScroll) window.initSharedNavScroll();
                        interceptRsvpForms(container);

                        function loadScript(src) {
                            return new Promise(function (resolve, reject) {
                                var script = document.createElement('script');
                                script.src = resolveApi(src);
                                script.onload = resolve;
                                script.onerror = reject;
                                document.body.appendChild(script);
                            });
                        }

                        var sectionScripts = [
                            'public/js/sections/fp-theme-gallery-thumbs.js',
                            'public/js/sections/fp-theme-gallery-thumbs-fade.js',
                            'public/js/sections/fp-theme-gallery-slider.js',
                            'public/js/sections/fp-theme-gallery-slider-arrows.js',
                            'public/js/sections/fp-theme-gallery-scroll.js',
                            'public/js/sections/fp-theme-team-slider.js',
                            'public/js/sections/fp-theme-team-carousel.js',
                            'public/js/sections/fp-theme-testimonial-carousel.js',
                            'public/js/sections/fp-theme-testimonials-interactive.js',
                            'public/js/sections/fp-theme-product-slider.js',
                            'public/js/sections/fp-theme-steps-slider.js',
                            'public/js/sections/fp-theme-pricing-toggle.js',
                            'public/js/sections/fp-theme-interactive-features.js',
                            'public/js/sections/fp-theme-accordion.js',
                            'public/js/sections/fp-theme-process-accordion.js',
                            'public/js/sections/fp-theme-popular-questions.js'
                        ];
                        var loadAll = sectionScripts.reduce(function (p, src) {
                            return p.then(function () { return loadScript(src).catch(function () {}); });
                        }, Promise.resolve());
                        loadAll.then(function () { return loadScript('public/js/section-initializer.js'); })
                            .then(function () {
                                if (window.SectionInitializer) {
                                    setTimeout(function () {
                                        var sectionsEls = container.querySelectorAll('section[id], footer[id]');
                                        sectionsEls.forEach(function (section) {
                                            if (section.id) window.SectionInitializer.initSection(section);
                                        });
                                    }, 200);
                                }
                            })
                            .catch(function (err) { console.warn('Section initializer load failed', err); });
                    } else {
                        sections.forEach(function (sectionData) {
                            var cleanHtml = cleanEditorMarkup(sectionData.html || '');
                            var temp = document.createElement('div');
                            temp.innerHTML = cleanHtml;
                            var sectionEl = temp.querySelector('section') || temp.querySelector('footer');
                            if (sectionEl) container.appendChild(sectionEl.cloneNode(true));
                            else {
                                var wrap = document.createElement('section');
                                wrap.innerHTML = cleanHtml;
                                container.appendChild(wrap);
                            }
                        });
                        container.classList.add('loaded');
                        if (window.initSharedNavScroll) window.initSharedNavScroll();
                        interceptRsvpForms(container);

                        var uniqueFilenames = new Set();
                        sections.forEach(function (s) { if (s.filename) uniqueFilenames.add(s.filename); });

                        function loadScript(src) {
                            return new Promise(function (resolve, reject) {
                                var script = document.createElement('script');
                                script.src = resolveApi(src);
                                script.onload = resolve;
                                script.onerror = reject;
                                document.body.appendChild(script);
                            });
                        }

                        loadScript('./public/js/section-initializer.js')
                            .then(function () {
                                return Promise.all(Array.from(uniqueFilenames).map(function (f) {
                                    return loadScript('./public/js/sections/' + f.replace('.html', '.js')).catch(function () {});
                                }));
                            })
                            .then(function () {
                                if (window.SectionInitializer) {
                                    setTimeout(function () {
                                        container.querySelectorAll('section[id], footer[id]').forEach(function (section) {
                                            if (section.id) window.SectionInitializer.initSection(section);
                                        });
                                    }, 200);
                                }
                            })
                            .catch(function (err) { console.warn('Script load failed', err); });
                    }
                })
                .catch(function (error) {
                    console.error('Failed to load shared document:', error);
                    showError(error.message || 'Failed to load the shared page');
                });
        }

        // Same as preview.php: nav gets .scrolled when #preview-content is scrolled (read-only, no editor)
        window.initSharedNavScroll = function () {
            var el = document.getElementById('preview-content');
            if (!el) return;
            var threshold = 80;
            function update() {
                var nav = el.querySelector('#nav, nav');
                if (nav) nav.classList.toggle('scrolled', el.scrollTop > threshold);
            }
            el.addEventListener('scroll', update, { passive: true });
            update();
            requestAnimationFrame(update);
        };
    </script>
</body>
</html>
