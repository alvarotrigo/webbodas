<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - ModernCo Editor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        
        .logout-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .status {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }
        
        .manual-link {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .manual-link a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.3s ease;
        }
        
        .manual-link a:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .error {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logo">ModernCo Editor</div>
        <div class="status">Logging you out...</div>
        <div class="spinner"></div>
        <div class="message">Please wait while we clear your session</div>
        
        <div class="manual-link">
            <a href="auth-wall.html">Continue to Login</a>
        </div>
    </div>

    <script>
        // Function to clear all local storage
        function clearLocalStorage() {
            const keysToRemove = [
                'editorMode',
                'isAuthenticated',
                'userEmail',
                'userName',
                'isPaid'
            ];
            
            keysToRemove.forEach(key => {
                localStorage.removeItem(key);
            });
            
            console.log('Local storage cleared');
        }
        
        // Function to call PHP logout endpoint
        async function callLogoutAPI() {
            try {
                const response = await fetch('api/auth-handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'logout'
                    })
                });
                
                const result = await response.json();
                console.log('Logout API response:', result);
                return result.success;
            } catch (error) {
                console.error('Logout API error:', error);
                return false;
            }
        }
        
        // Function to sign out from Clerk if available
        async function signOutFromClerk() {
            try {
                if (typeof Clerk !== 'undefined' && Clerk.signOut) {
                    await Clerk.signOut();
                    console.log('Signed out from Clerk');
                    return true;
                }
            } catch (error) {
                console.error('Clerk sign out error:', error);
            }
            return false;
        }
        
        // Main logout function
        async function performLogout() {
            console.log('Starting logout process...');

            // Clear local storage first
            clearLocalStorage();
            
            // Try to call PHP logout API
            const apiSuccess = await callLogoutAPI();
            
            // Try to sign out from Clerk
            const clerkSuccess = await signOutFromClerk();
            
            // Wait a moment for everything to complete
            setTimeout(() => {
                // Redirect to auth wall
                window.location.href = 'auth-wall.html';
            }, 1500);
        }
        
        // Start logout process when page loads
        document.addEventListener('DOMContentLoaded', () => {
            performLogout();
        });
        
        // Fallback: if page doesn't redirect after 5 seconds, show manual link
        setTimeout(() => {
            const status = document.querySelector('.status');
            const message = document.querySelector('.message');
            const spinner = document.querySelector('.spinner');
            
            if (status && message && spinner) {
                status.textContent = 'Logout completed';
                message.textContent = 'You have been successfully logged out.';
                spinner.style.display = 'none';
            }
        }, 5000);
    </script>
    
    <!-- Clerk Configuration -->
    <script src="clerk-config.js"></script>
    
    <!-- Clerk Script -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_am9pbnQtYmxvd2Zpc2gtNjUuY2xlcmsuYWNjb3VudHMuZGV2JAlcmsuYWNjb3VudHMuZGV2JA"
        src="https://welcomed-escargot-22.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript">
    </script>
</body>
</html>
