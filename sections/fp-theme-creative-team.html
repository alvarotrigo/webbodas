<section id="fp-theme-creative-team" class="min-h-screen flex items-center" style="background: var(--primary-bg);">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 py-24">
          <div class="grid lg:grid-cols-2 gap-16 items-center">
            <!-- Left Side - Content -->
            <div>
              <h2 class="text-4xl md:text-5xl font-bold mb-6" style="color: var(--primary-text); font-family: var(--heading-font);">
                Our leading, strong &amp; creative team
              </h2>
              <p class="text-lg leading-relaxed mb-8" style="color: var(--secondary-text);">
                Our team is a group of highly skilled and passionate professionals committed to making our product.
              </p>

                Join our team
              </button>
            </div>

            <!-- Right Side - Team Grid -->
            <div data-fp-anim-children="true" class="grid grid-cols-2 gap-6">
              <!-- Team Member 1 -->
              <div data-bg-image="true" class="team-member-card relative rounded-3xl overflow-hidden group cursor-pointer" style="aspect-ratio: 1/1;">
                <img loading="lazy" src="./public/images/person-1.jpg" alt="Sarah Mitchell" class="w-full h-full object-cover">
                <div class="absolute inset-0 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                  <div class="absolute inset-0 opacity-70" style="background: var(--primary-accent);"></div>
                  <h3 class="text-2xl font-bold text-white mb-2 relative z-10">Sarah Mitchell</h3>
                  <p class="text-lg text-white relative z-10">Creative Director</p>
                </div>
              </div>

                  <h3 class="text-2xl font-bold text-white mb-2 relative z-10">Marcus Chen</h3>
