<section id="fp-theme-gallery-slider" class="min-h-screen flex items-center justify-center bg-themed-secondary">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
          <!-- Header Content -->
          <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6" style="color: var(--primary-text); font-family: var(--heading-font);">
              A Window Into Our Work
            </h2>
            <p class="text-lg md:text-xl max-w-3xl mx-auto mb-8" style="color: var(--secondary-text);">
              Explore a collection of visuals that highlight our best work, milestones, and creative moments.
            </p>
            <a href="#" class="inline-flex items-center btn-themed text-lg px-8 py-4 gap-2">
              See All
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </a>
          </div>

          <!-- Gallery Slider -->
          <div data-fp-anim-children="true" class="grid lg:grid-cols-[300px_1fr] gap-6 items-center">
            <!-- Thumbnail Navigation -->
            <div data-fp-anim-children="true" class="flex lg:flex-col gap-4 overflow-x-auto lg:overflow-visible pb-4 lg:pb-0 lg:h-[500px]">
              <button class="gallery-slider-thumb active flex-shrink-0 w-24 h-24 lg:w-full lg:flex-1 overflow-hidden transition-opacity duration-300" style="border-radius: var(--card-radius);" data-slide="0">
                <img loading="lazy" src="./public/images/workspace.jpg" alt="Gallery thumbnail 1" class="w-full h-full object-cover">
              </button>
              <button class="gallery-slider-thumb flex-shrink-0 w-24 h-24 lg:w-full lg:flex-1 overflow-hidden opacity-50 hover:opacity-75 transition-opacity duration-300" style="border-radius: var(--card-radius);" data-slide="1">
                <img loading="lazy" src="./public/images/business-team.jpg" alt="Gallery thumbnail 2" class="w-full h-full object-cover">
              </button>
              <button class="gallery-slider-thumb flex-shrink-0 w-24 h-24 lg:w-full lg:flex-1 overflow-hidden opacity-50 hover:opacity-75 transition-opacity duration-300" style="border-radius: var(--card-radius);" data-slide="2">
                <img loading="lazy" src="./public/images/nature-1.jpg" alt="Gallery thumbnail 3" class="w-full h-full object-cover">
              </button>
            </div>

            <!-- Main Slider -->
            <div class="relative overflow-hidden" style="border-radius: var(--card-radius);">
              <div class="gallery-slider-container flex transition-transform duration-500 ease-in-out">
                <div class="gallery-slider-slide min-w-full h-[500px]">
                  <img loading="lazy" src="./public/images/workspace.jpg" alt="Gallery slide 1" class="w-full h-full object-cover">
                </div>
                <div class="gallery-slider-slide min-w-full h-[500px]">
                  <img loading="lazy" src="./public/images/business-team.jpg" alt="Gallery slide 2" class="w-full h-full object-cover">
                </div>
                <div class="gallery-slider-slide min-w-full h-[500px]">
                  <img loading="lazy" src="./public/images/nature-1.jpg" alt="Gallery slide 3" class="w-full h-full object-cover">
                </div>
              </div>

              <!-- Navigation Arrows -->
              <button class="gallery-slider-prev absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/90 hover:bg-white flex items-center justify-center shadow-lg transition-colors duration-300 z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
              </button>
              <button class="gallery-slider-next absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/90 hover:bg-white flex items-center justify-center shadow-lg transition-colors duration-300 z-10">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
