<section id="fp-theme-simple-form" class="min-h-screen flex items-center relative overflow-hidden" data-bg="true" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1551434678-e076c223a692?w=2070&amp;h=1380&amp;fit=crop'); background-size: cover; background-position: center;">
        <div class="fp-bg"></div>
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center relative z-10">
          <h2 class="text-4xl md:text-6xl lg:text-7xl font-bold mb-8 text-white" style="font-family: var(--heading-font);">
            Say Hello
          </h2>
          <p class="text-xl md:text-2xl mb-12 text-white/90">
            Feel free to ask anything about our products.
          </p>
          <form class="max-w-lg mx-auto space-y-6">
            <div>
              <input type="text" placeholder="Your name" class="w-full px-6 py-4 text-lg" style="border-radius: var(--card-radius); background-color: var(--primary-bg); color: var(--primary-text); border: 1px solid var(--border-color);">
            </div>
            <div>
              <input type="email" placeholder="Email address" class="w-full px-6 py-4 text-lg" style="border-radius: var(--card-radius); background-color: var(--primary-bg); color: var(--primary-text); border: 1px solid var(--border-color);">
            </div>
            <div>
              <textarea placeholder="Message" rows="6" class="w-full px-6 py-4 text-lg resize-none" style="border-radius: var(--card-radius); background-color: var(--primary-bg); color: var(--primary-text); border: 1px solid var(--border-color);"></textarea>
            </div>
            <a href="#" type="submit" class="justify-center flex w-full px-8 py-4 text-lg font-semibold">
              Send message
            </a>
          </form>
        </div>
      </section>
