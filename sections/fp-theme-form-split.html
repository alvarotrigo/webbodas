<section id="fp-theme-form-split" class="min-h-screen flex items-center">
        <div class="fp-bg"></div>
        <div class="grid lg:grid-cols-2 h-full w-full" style="--fp-delay-form: 0s; --fp-delay-label: 0s; --fp-delay-input: 0s;">
          <!-- Left Half with Background Image -->
          <div class="relative min-h-screen" data-bg="true" style="background: url('https://images.unsplash.com/photo-1551434678-e076c223a692?w=800&amp;h=1200&amp;fit=crop'); background-size: cover; background-position: center;">
            <div class="absolute inset-0 bg-black/30"></div>
          </div>
          <!-- Right Half with Contact Form -->
          <div class="flex items-center justify-center p-8 lg:p-16" style="background-color: var(--primary-bg);">
            <div class="max-w-md w-full">
              <h2 class="fp-keep-color text-4xl md:text-5xl font-bold mb-8" style="color: var(--primary-text); font-family: var(--heading-font);">
                CONTACT US
              </h2>
              <form class="space-y-6">
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--secondary-text);">Your name</label>
                  <input type="text" placeholder="Name" class="w-full px-4 py-3 border border-gray-300" style="border-radius: var(--card-radius); background-color: var(--secondary-bg); color: var(--primary-text);">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--secondary-text);">Email address</label>
                  <input type="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300" style="border-radius: var(--card-radius); background-color: var(--secondary-bg); color: var(--primary-text);">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2" style="color: var(--secondary-text);">Message</label>
                  <textarea placeholder="Message" rows="5" class="w-full px-4 py-3 resize-none border border-gray-300" style="border-radius: var(--card-radius); background-color: var(--secondary-bg); color: var(--primary-text);"></textarea>
                </div>
                <a href="#" type="submit" class="inline-flex px-8 py-4 text-lg font-semibold btn-themed" style="border-radius: var(--card-radius);">
                  Send message
                </a>
              </form>
            </div>
          </div>
        </div>
      </section>
