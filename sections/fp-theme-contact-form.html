<section id="fp-theme-contact-form" class="min-h-screen flex items-center bg-themed-primary">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full py-20">
          <div data-fp-anim-children="true" class="grid lg:grid-cols-2 grid-cols-1 gap-x-16 gap-y-10 items-stretch">
            <!-- Left Side - Contact Form -->
            <div class="flex items-center">
              <div class="w-full">
                <h4 class="text-base font-medium leading-6 mb-4" style="color: var(--primary-accent);">Contact Us</h4>
                <h2 class="text-4xl md:text-5xl font-bold heading-themed leading-tight mb-10">Reach Out To Us</h2>
                <form onsubmit="handleContactForm(event)">
                  <input type="text" name="name" class="w-full h-14 shadow-sm text-themed-primary placeholder:text-themed-secondary text-lg font-normal leading-7 rounded-full border border-themed focus:outline-none focus:ring-2 py-2 px-6 mb-6 bg-themed-secondary transition-all duration-300" placeholder="Name" required="" maxlength="100">
                  <input type="email" name="email" class="w-full h-14 shadow-sm text-themed-primary placeholder:text-themed-secondary text-lg font-normal leading-7 rounded-full border border-themed focus:outline-none focus:ring-2 py-2 px-6 mb-6 bg-themed-secondary transition-all duration-300" placeholder="Email" required="" maxlength="255">
                  <textarea name="message" class="w-full h-48 shadow-sm resize-none text-themed-primary placeholder:text-themed-secondary text-lg font-normal leading-7 rounded-2xl border border-themed focus:outline-none focus:ring-2 px-6 py-4 mb-8 bg-themed-secondary transition-all duration-300" placeholder="Your Message" required="" maxlength="1000"></textarea>
                  <button type="submit" class="w-full h-14 text-center text-on-primary text-lg font-semibold leading-6 rounded-full shadow-lg transition-all duration-500 hover:shadow-xl transform hover:-translate-y-0.5" style="background: var(--primary-accent);">
                    Submit
                  </button>
                </form>
              </div>
            </div>

            <div class="lg:min-h-[600px] min-h-[500px] flex items-center justify-center bg-cover bg-center rounded-3xl relative overflow-hidden" data-bg="true" style="background-image: url('https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600&amp;h=400&amp;fit=crop');">

              <div class="absolute inset-0" style="background: rgba(0, 0, 0, 0.3);"></div>

                      <div class="flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-accent);">
