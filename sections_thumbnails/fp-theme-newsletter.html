<section id="fp-theme-newsletter" class="min-h-screen flex items-center justify-center relative overflow-hidden" style="background-color: var(--secondary-bg);">
        <div class="fp-bg"></div>
        <div data-fp-anim-children="true" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 w-full">
          <!-- White Card Container -->
          <div class="md:grid md:grid-cols-2 max-w-6xl mx-auto relative" style="background: var(--primary-bg); border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); overflow: hidden; min-height: 80dvh;">
            

            <!-- Left Side - Image -->
            <div class="relative h-[400px] md:h-full">
              <div class="absolute inset-0">
                <img loading="lazy" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=133&amp;h=150&amp;fit=crop" alt="Newsletter" class="w-full h-full object-cover rounded-2xl">
              </div>
            </div>

            <!-- Right Side - Form -->
            <div class="fp-keep-color relative flex items-center justify-center">
              <div class="max-md:py-20 px-8 md:px-16 text-center">
                <h1 class="text-4xl md:text-5xl font-bold" style="color: var(--primary-text); font-family: var(--heading-font);">
                  Subscribe to our newsletter
                </h1>
                <p class="mt-4 text-lg" style="color: var(--secondary-text);">
                  Be the first to get the latest news about trends, promotions, and much more!
                </p>
                <form class="mt-8 flex">
                  <input type="email" placeholder="Your email address" class="w-full outline-none rounded-l-md border border-r-0 p-6 text-lg transition-all duration-300 focus:outline-none focus:ring-2" style="border-color: var(--border-color); background-color: var(--secondary-bg); color: var(--primary-text); focus:ring-color: var(--primary-accent);">
                  <button type="submit" class="rounded-r-md px-8 py-6 text-lg font-semibold text-on-primary transition-all duration-300 hover:opacity-90" style="background: var(--primary-accent);">
                    Submit
                  </button>
                </form>
              </div>
            </div>

          </div>
        </div>
      </section>
