<section id="fp-theme-newsletter-centered" class="min-h-screen flex items-center justify-center relative overflow-hidden" style="background-color: var(--primary-bg);">
        <div class="fp-bg"></div>
        <div data-fp-anim-children="true" class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
          
          <!-- Badge -->
          <div class="fp-keep-color inline-flex items-center gap-2 text-sm font-medium px-4 py-2 mb-6" style="color: var(--primary-accent); background-color: var(--secondary-bg); border-radius: 9999px;">
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1.613 8.2a.62.62 0 0 1-.553-.341.59.59 0 0 1 .076-.637l6.048-6.118a.31.31 0 0 1 .375-.069c.061.033.11.084.137.147a.3.3 0 0 1 .014.197L6.537 4.991a.59.59 0 0 0 .07.552.61.61 0 0 0 .504.257h4.276a.62.62 0 0 1 .553.341.59.59 0 0 1-.076.637l-6.048 6.119a.31.31 0 0 1-.375.067.295.295 0 0 1-.15-.344l1.172-3.61a.59.59 0 0 0-.07-.553.61.61 0 0 0-.504-.257z" stroke="currentColor" stroke-miterlimit="5.759" stroke-linecap="round"></path>
            </svg>
            <span>Simple Process</span>
          </div>

          <!-- Heading -->
          <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6" style="color: var(--primary-text); font-family: var(--heading-font);">
            Get started for free today
          </h2>

          <!-- Description -->
          <p class="text-lg md:text-xl mb-10 max-w-2xl mx-auto" style="color: var(--secondary-text);">
            Join thousands of users who are already creating amazing things, completely free to start.
          </p>

          <!-- Email Form -->
          <form class="relative flex items-center max-w-2xl mx-auto transition-all duration-300" style="border: 1px solid var(--border-color); border-radius: var(--card-radius); background-color: var(--secondary-bg); box-shadow: var(--shadow-sm);">
            
            <!-- Email Icon -->
            <svg class="absolute left-4 pointer-events-none" width="19" height="17" viewBox="0 0 19 17" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 6 9.505 8.865a1 1 0 0 1-1.005 0L4 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--secondary-text); opacity: 0.5;"></path>
              <path d="M16.3 1H2.7C1.761 1 1 1.84 1 2.875v11.25C1 15.161 1.761 16 2.7 16h13.6c.939 0 1.7-.84 1.7-1.875V2.875C18 1.839 17.239 1 16.3 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--secondary-text); opacity: 0.5;"></path>
            </svg>

            <!-- Input Field -->
            <input type="email" name="email" placeholder="Enter your email" class="flex-1 pl-12 pr-4 py-5 text-base focus:outline-none bg-transparent" style="color: var(--primary-text);" required="">

            <!-- Submit Button -->
            <button type="submit" class="shrink-0 mr-2 px-6 md:px-8 py-3 text-sm md:text-base font-semibold text-on-primary transition-all duration-300 hover:opacity-90 active:scale-95" style="background: var(--gradient-2); border-radius: var(--card-radius);">
              Subscribe now
            </button>
          </form>

        </div>
      </section>
