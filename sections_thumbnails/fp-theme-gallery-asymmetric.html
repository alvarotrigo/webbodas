<section id="fp-theme-gallery-asymmetric" class="min-h-screen flex items-center justify-center bg-themed-primary">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
          <!-- Header Content -->
          <div class="text-center mb-16">
            <p class="text-sm font-semibold uppercase tracking-wider mb-4" style="color: var(--primary-color);">Gallery</p>
            <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6" style="color: var(--primary-text); font-family: var(--heading-font);">
              Our Work in Pictures
            </h2>
            <p class="text-lg md:text-xl max-w-3xl mx-auto" style="color: var(--secondary-text);">
              Explore our gallery to learn more about our amazing products and their features.
            </p>
          </div>

          <!-- Gallery Grid -->
          <div data-fp-anim-children="true" class="grid grid-cols-1 lg:grid-cols-2 gap-4 h-[600px]">
            <!-- Large Left Image -->
            <div class="h-full overflow-hidden" style="border-radius: var(--card-radius);">
              <img loading="lazy" src="./public/images/nature-1.jpg" alt="Gallery showcase" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300 shadow-lg">
            </div>
            
            <!-- Right Grid -->
            <div class="grid grid-cols-2 gap-4 h-full">
              <!-- Top Left -->
              <div class="overflow-hidden" style="border-radius: var(--card-radius);">
                <img loading="lazy" src="./public/images/workspace.jpg" alt="Gallery image" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300 shadow-lg">
              </div>
              
              <!-- Top Right -->
              <div class="overflow-hidden" style="border-radius: var(--card-radius);">
                <img loading="lazy" src="./public/images/business-team.jpg" alt="Gallery image" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300 shadow-lg">
              </div>
              
              <!-- Bottom Span 2 Columns -->
              <div class="col-span-2 overflow-hidden" style="border-radius: var(--card-radius);">
                <img loading="lazy" src="./public/images/dark-tech-bg.jpg" alt="Gallery image" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300 shadow-lg">
              </div>
            </div>
          </div>
        </div>
      </section>
