<section id="fp-theme-contact" class="min-h-screen flex items-center bg-themed-accent">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
          <div class="text-center mb-20">
            <h2 class="text-4xl md:text-6xl lg:text-7xl font-bold heading-themed mb-8">Contact Us</h2>
            <p class="text-xl md:text-2xl text-themed-secondary max-w-4xl mx-auto leading-relaxed">
              Ready to transform your vision into reality? Let's start the conversation
            </p>
          </div>
          <div data-fp-anim-children="true" class="grid lg:grid-cols-2 gap-16">
            <div class="space-y-10">
              <div class="flex items-start space-x-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="mail" aria-hidden="true" class="lucide lucide-mail text-themed-accent mt-2 w-8 h-8"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
                <div>
                  <h3 class="text-themed-primary font-semibold mb-2 text-xl">Email</h3>
                  <p class="text-themed-secondary text-lg">hello@modernco.com</p>
                </div>
              </div>
              <div class="flex items-start space-x-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="phone" aria-hidden="true" class="lucide lucide-phone text-themed-accent mt-2 w-8 h-8"><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"></path></svg>
                <div>
                  <h3 class="text-themed-primary font-semibold mb-2 text-xl">Phone</h3>
                  <p class="text-themed-secondary text-lg">+1 (555) 123-4567</p>
                </div>
              </div>
              <div class="flex items-start space-x-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="map-pin" aria-hidden="true" class="lucide lucide-map-pin text-themed-accent mt-2 w-8 h-8"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <div>
                  <h3 class="text-themed-primary font-semibold mb-2 text-xl">Address</h3>
                  <p class="text-themed-secondary text-lg">123 Innovation Street<br>Tech City, TC 12345</p>
                </div>
              </div>
            </div>
            <form class="space-y-8" onsubmit="handleContactForm(event)">
              <div>
                <input type="text" placeholder="Your Name" required="" class="w-full px-6 py-4 bg-themed-accent border border-gray-300 text-themed-primary placeholder-gray-400 focus:outline-none focus:border-themed-accent rounded text-lg" style="border-radius: var(--button-radius);">
              </div>
              <div>
                <input type="email" placeholder="Your Email" required="" class="w-full px-6 py-4 bg-themed-accent border border-gray-300 text-themed-primary placeholder-gray-400 focus:outline-none focus:border-themed-accent rounded text-lg" style="border-radius: var(--button-radius);">
              </div>
              <div>
                <textarea rows="6" placeholder="Your Message" required="" class="w-full px-6 py-4 bg-themed-accent border border-gray-300 text-themed-primary placeholder-gray-400 focus:outline-none focus:border-themed-accent resize-none rounded text-lg" style="border-radius: var(--button-radius);"></textarea>
              </div>
              <a href="#" type="submit" class="flex btn-themed w-full flex items-center justify-center space-x-3 text-lg py-4">
                Send Message
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="arrow-right" aria-hidden="true" class="lucide lucide-arrow-right w-6 h-6"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
              </a>
            </form>
          </div>
        </div>
      </section>
