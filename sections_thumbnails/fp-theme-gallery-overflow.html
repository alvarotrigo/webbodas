<section id="fp-theme-gallery-overflow" class="min-h-screen flex flex-col justify-center overflow-hidden bg-themed-primary">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 w-full text-center">
          <h2 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-6" style="color: var(--primary-text); font-family: var(--heading-font);">
            Portraits of Play
          </h2>
          <p class="text-lg md:text-xl mb-16 mx-auto max-w-3xl" style="color: var(--secondary-text);">
            Discover the essence of gaming characters in our unique gallery,<br>
            where every pixel holds a story.
          </p>
        </div>

        <!-- Gallery with overflow -->
        <div class="relative w-full mb-16 overflow-hidden">
          <div data-fp-dynamic-items="true" data-fp-anim-children="true" class="flex justify-center items-center gap-6">
            <!-- Left image - half visible (right half) -->
            <div class="flex-shrink-0 w-[50vw] md:w-[40vw] lg:w-[32vw] -ml-[25vw] md:-ml-[20vw] lg:-ml-[16vw]">
              <img loading="lazy" src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=150&amp;h=90&amp;fit=crop" alt="Gaming character portrait 1" class="w-full h-[200px] md:h-[280px] lg:h-[320px] object-cover shadow-2xl transition-transform duration-300 hover:scale-105" style="border-radius: var(--card-radius);">
            </div>
            
            <!-- Center image - fully visible -->
            <div class="flex-shrink-0 w-[50vw] md:w-[40vw] lg:w-[32vw]">
              <img loading="lazy" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=150&amp;h=90&amp;fit=crop" alt="Gaming character portrait 2" class="w-full h-[200px] md:h-[280px] lg:h-[320px] object-cover shadow-2xl transition-transform duration-300 hover:scale-105" style="border-radius: var(--card-radius);">
            </div>
            
            <!-- Right image - half visible (left half) -->
            <div class="flex-shrink-0 w-[50vw] md:w-[40vw] lg:w-[32vw] -mr-[25vw] md:-mr-[20vw] lg:-mr-[16vw]">
              <img loading="lazy" src="https://images.unsplash.com/photo-1535223289827-42f1e9919769?w=150&amp;h=90&amp;fit=crop" alt="Gaming character portrait 3" class="w-full h-[200px] md:h-[280px] lg:h-[320px] object-cover shadow-2xl transition-transform duration-300 hover:scale-105" style="border-radius: var(--card-radius);">
            </div>
          </div>
        </div>

        <!-- Scroll to explore text -->
        <div class="text-center pb-12">
          <p class="text-lg inline-flex items-center gap-2" style="color: var(--secondary-text);">
            Scroll to Explore
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </p>
        </div>
      </section>
