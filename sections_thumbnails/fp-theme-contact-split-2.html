<section id="fp-theme-contact-split-2" class="min-h-screen max-h-dvh flex items-center overflow-hidden">
        <div class="fp-bg"></div>
        <div class="grid lg:grid-cols-2 h-full w-full">
          <!-- Left Half with Background Image -->
          <div class="relative min-h-[50vh] lg:min-h-screen" data-bg="true" style="background: url(&quot;https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=260&amp;h=146&amp;fit=crop&quot;); background-size: cover; background-position: center;">
            <div class="absolute inset-0 bg-gradient-to-r from-black/30 to-transparent"></div>
          </div>
          
          <!-- Right Half with Contact Form -->
          <div class="flex items-center justify-center p-8 lg:p-16" style="background-color: var(--primary-bg);">
            <div class="w-full max-w-lg p-8 md:p-12 shadow-2xl" style="background: var(--card-bg); border-radius: var(--card-radius);">
              <h2 class="text-4xl md:text-5xl font-bold mb-8 text-center text-themed-primary" style="font-family: var(--heading-font);">
                CONTACT US
              </h2>
              <form class="space-y-6">
                <div>
                  <label class="block text-sm font-medium mb-2 text-themed-secondary">Your name</label>
                  <input type="text" placeholder="Name" class="w-full px-4 py-3 outline-none transition-all duration-300 text-themed-primary" style="background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: var(--button-radius);">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2 text-themed-secondary">Email address</label>
                  <input type="email" placeholder="Email" class="w-full px-4 py-3 outline-none transition-all duration-300 text-themed-primary" style="background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: var(--button-radius);">
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2 text-themed-secondary">Message</label>
                  <textarea placeholder="Message" rows="5" class="w-full px-4 py-3 resize-none outline-none transition-all duration-300 text-themed-primary" style="background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: var(--button-radius);"></textarea>
                </div>
                <button type="submit" class="w-full px-8 py-4 text-lg font-semibold text-on-primary transition-all duration-300 hover:opacity-90 flex items-center justify-center gap-2" style="border-radius: var(--button-radius); background: var(--primary-accent);">
                  Submit →
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
