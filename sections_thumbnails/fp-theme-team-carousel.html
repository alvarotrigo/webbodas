<section id="fp-theme-team-carousel" class="min-h-screen flex items-center bg-themed-primary">
        <div class="fp-bg"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">

                <!-- Team Member 1 -->
                <div class="team-carousel-card flex-shrink-0 w-full sm:w-[calc(50%-12px)] md:w-[calc(33.333%-16px)] lg:w-[calc(25%-18px)]" style="width: 245.333px;">
                  <div class="rounded-3xl overflow-hidden mb-6 bg-themed-secondary">
                    <img loading="lazy" src="./public/images/person-1.jpg" alt="Michael Gannon" class="w-full aspect-[3/4] object-cover">
                  </div>
                  <h3 class="text-2xl font-bold heading-themed mb-2 text-center">Michael Gannon</h3>
                  <p class="text-themed-secondary text-center text-lg">Founder</p>
