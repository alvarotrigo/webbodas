server {
  listen 8080;
  listen [::]:8080;
  server_name yeslovey.com;
  root /home/yeslovey/htdocs/yeslovey.com; 

  include /etc/nginx/global_settings;

  # Rewrite rules matching .htaccess
  # IMPORTANT: Exact matches have highest priority
  
  # /signin or /signin/ → auth-wall.html
  location = /signin {  
    rewrite ^ /auth-wall.html last;
  }
  
  location = /signin/ {
    rewrite ^ /auth-wall.html last;
  }

  # /subscribe or /subscribe/ → subscribe.php
  location = /subscribe {
    rewrite ^ /subscribe.php last;
  }
  
  location = /subscribe/ {
    rewrite ^ /subscribe.php last;
  }

  # Handle /app specifically
  location = /app {
    rewrite ^ /app.php last;
  }

  location = /app/ {
    rewrite ^ /app.php last;
  }

  # Handle /rsvp specifically
  location = /rsvp {
    rewrite ^ /rsvp.php last;
  }

  location = /rsvp/ {
    rewrite ^ /rsvp.php last;
  }

  # Security headers (matching .htaccess)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache control for static assets (matching .htaccess)
  location ~* \.(jpg|jpeg|gif|png|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(css|js)$ {
    expires 1M;
    add_header Cache-Control "public";
  }

  location ~* \.(woff2|woff|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # PHP handling
  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /home/yeslovey/htdocs/yeslovey.com$fastcgi_script_name;
    fastcgi_pass 127.0.0.1:19000;
    fastcgi_read_timeout 3600;
    fastcgi_send_timeout 3600;
    fastcgi_param HTTPS "on";
    fastcgi_param SERVER_PORT 443;
  }

  # Default index files
  index index.html index.php;

  # Try files - this ensures direct file access works properly
  location / {
    try_files $uri $uri/ /index.php?$args;
  }
}

