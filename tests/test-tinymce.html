<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>
<body>
    

<div >
    <a href="https://www.google.com" class="tinymce-heading">
        <span>Position curson on the last position and type</span>
    </a>  
</div>

<script src="https://cdn.tiny.cloud/1/qagffr3pkuv17a8on1afax661irst1hbr4e6tbv888sz91jc/tinymce/8/tinymce.min.js"></script>

<script>

    const emailHeaderConfig = {
        selector: '.tinymce-heading',
        menubar: false,
        inline: true,
        toolbar: 'undo redo | bold italic underline',
        valid_elements: 'strong,em,span[style],a[href]',
        valid_styles: {
            '*': 'font-size,font-family,color,text-decoration,text-align'
        },
    };


    tinymce.init(emailHeaderConfig);

</script>
</body>
</html>
