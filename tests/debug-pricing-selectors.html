<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Pricing Section Selectors</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .found { background: lightgreen; }
        .not-found { background: lightcoral; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        .selector { font-weight: bold; color: #0066cc; }
    </style>
</head>
<body>
    <h1>Pricing Section Selector Analysis</h1>
    <div id="results"></div>
    <h2>Section HTML:</h2>
    <div id="html-container"></div>

    <script>
        // Expected selectors from text_updates
        const expectedSelectors = {
            "h2[0]": "Explore Affordable Membership Plans",
            "p[0]": "Dive into our exciting membership options...",
            "a[0]": "Monthly Plan",
            "a[1]": "Yearly Plan Save 20%",
            "span[0]": "Save 20%",
            // FIRST CARD (Pro / Starter)
            "h3[0]": "Starter",
            "p[1]": "Perfect for those who are just getting started...",
            "span[1]": "€39",
            "span[2]": "/month",
            "p[2]": "Charged annually (save €120)",
            "li[0]": "Access to all youth classes",
            "li[1]": "Personal workout tracker",
            "li[2]": "Unlimited gym access",
            "a[2]": "Try it Free",
            // BADGE
            "div[9]": "Popular Choice",
            // SECOND CARD (Business / Standard)
            "h3[1]": "Standard",
            "p[3]": "Our most popular choice!...",
            "span[3]": "€79",
            "span[4]": "/month",
            "p[4]": "Charged annually (save €240)",
            "li[3]": "Access to all youth classes",
            "li[4]": "Personal workout tracker",
            "li[5]": "Group training sessions",
            "a[3]": "Try it Free",
            // THIRD CARD (Advanced / Premium)
            "h3[2]": "Premium",
            "p[5]": "For the dedicated fitness enthusiast...",
            "span[5]": "€129",
            "span[6]": "/month",
            "p[6]": "Charged annually (save €360)",
            "li[6]": "Access to all youth classes",
            "li[7]": "Personal workout tracker",
            "li[8]": "Unlimited group training",
            "a[4]": "Try it Free"
        };

        async function loadSection() {
            const response = await fetch('../sections/fp-theme-pricing-2.html');
            const html = await response.text();
            
            // Create a container to parse the HTML
            const container = document.createElement('div');
            container.innerHTML = html;
            
            // Find the section element
            const section = container.querySelector('section');
            document.getElementById('html-container').appendChild(section.cloneNode(true));
            
            // Analyze selectors
            const results = [];
            
            for (const [selector, expectedText] of Object.entries(expectedSelectors)) {
                const match = selector.match(/^([a-z0-9]+)\[([0-9]+)\]$/i);
                let tag, index;
                
                if (match) {
                    tag = match[1];
                    index = parseInt(match[2]);
                } else {
                    tag = selector;
                    index = 0;
                }
                
                const elements = section.querySelectorAll(tag);
                const element = elements[index];
                
                results.push({
                    selector,
                    expectedText: expectedText.substring(0, 40) + '...',
                    found: !!element,
                    actualText: element ? element.textContent.trim().substring(0, 40) + '...' : 'NOT FOUND',
                    totalFound: elements.length
                });
            }
            
            // Build results table
            let html = '<table><tr><th>Selector</th><th>Expected Text</th><th>Actual Text</th><th>Total Elements</th><th>Status</th></tr>';
            
            for (const result of results) {
                const rowClass = result.found ? 'found' : 'not-found';
                html += `<tr class="${rowClass}">
                    <td class="selector">${result.selector}</td>
                    <td>${result.expectedText}</td>
                    <td>${result.actualText}</td>
                    <td>${result.totalFound}</td>
                    <td>${result.found ? '✅ Found' : '❌ NOT FOUND'}</td>
                </tr>`;
            }
            
            html += '</table>';
            document.getElementById('results').innerHTML = html;
        }
        
        loadSection();
    </script>
</body>
</html>
